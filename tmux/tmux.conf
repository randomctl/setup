bind C-b
set -g prefix F10 # F10 was changed to CAPS-LOCK in os.

set -sg escape-time 0

bind l resize-pane -L 5
bind r resize-pane -R 5
bind | split-window -h
bind - split-window -v
bind  Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R
bind a new-window
bind-key N command-prompt -p "New session name:" "new-session -s '%%'"
bind x kill-pane

set -g history-limit 100000
set -g mouse on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind s choose-tree -ZsK '#{?#{e|<:#{line},9},#{e|+:1,#{line}},#{?#{e|<:#{line},35},M-#{a:#{e|+:97,#{e|-:#{line},9}}},}}'

bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"


set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=green'

set -g status-left ''
set -g status-left-length 15

set -g status-right-style 'fg=black bg=yellow'
set -g status-right ' %Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-format '#[fg=green,bold] #I:#W '
setw -g window-status-current-format '#[bg=black]|#[fg=green,bold]* #I:#W '

# messages
set -g message-style 'fg=yellow bg=red bold'
